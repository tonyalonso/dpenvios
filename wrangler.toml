# ─────────────────────────────────────────────────────────
# Configuración de Cloudflare Pages + Workers KV
# Díaz Premium Envíos
# ─────────────────────────────────────────────────────────

name = "diaz-premium-envios"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV Namespace binding
# Crea el namespace con: wrangler kv namespace create DIAZ_PREMIUM_DB
# Luego copia el ID aquí:
[[kv_namespaces]]
binding = "DB"
id = "TU_KV_NAMESPACE_ID_AQUI"

# Variables de entorno
[vars]
NODE_ENV = "production"
ADMIN_TOKEN_KEY = "diaz-admin-token"

# Build settings para Next.js
[build]
command = "bun run build"
upload_format = "service-worker"

# Nota: Para deployar, ejecuta:
# 1. wrangler kv namespace create DIAZ_PREMIUM_DB
# 2. Copiar el ID del namespace arriba
# 3. wrangler pages deploy .next/standalone --project-name diaz-premium-envios
